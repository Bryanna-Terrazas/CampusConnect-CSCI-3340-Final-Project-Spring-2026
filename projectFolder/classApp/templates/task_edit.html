{% extends 'base.html' %}
{% block content %}
<h1>Edit Task</h1>
<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" value="{{ task.title }}" required><br>
    <textarea name="description">{{ task.description }}</textarea><br>
    <input type="date" name="due_date" value="{{ task.due_date }}"><br>
    <input type="checkbox" name="completed" {% if task.completed %}checked{% endif %}> Completed<br>
    <button type="submit">Update Task</button>
</form>
<a href="{% url 'task_list' %}">Back</a>
{% endblock %}
